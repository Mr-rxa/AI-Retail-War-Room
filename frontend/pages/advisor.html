<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Advisor · AI Retail War Room</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/pages.css">
</head>
<body data-page="advisor">

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-col">
    <div id="navbarMount"></div>

    <main class="content">
      <div id="errorBanner" class="error-banner"></div>

      <div class="panel" style="margin-bottom:20px;">
        <div class="panel-body" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
          <div>
            <h3 style="margin:0 0 3px;font-size:14px;">Executive AI Report</h3>
            <div style="font-size:12px;color:var(--text-muted);">Generated by Gemini from live business data — summary, health, insights, risks, recommendations and a 30-day action plan.</div>
          </div>
          <div class="advisor-toolbar">
            <button class="btn-primary" id="generateBtn"><i class="bi bi-stars"></i>Generate Report</button>
            <button class="btn-outline" id="regenerateBtn"><i class="bi bi-arrow-clockwise"></i>Regenerate</button>
            <button class="btn-outline" id="copyBtn" disabled><i class="bi bi-clipboard"></i>Copy</button>
            <button class="btn-outline" id="downloadBtn" disabled><i class="bi bi-download"></i>Download</button>
          </div>
        </div>
      </div>

      <div class="advisor-report" id="reportContainer">
        <div class="advisor-empty"><i class="bi bi-stars"></i>Generating executive report…</div>
      </div>

      <div id="footerMount"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/advisor.js"></script>
</body>
</html>
