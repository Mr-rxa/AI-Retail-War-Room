<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forecast · AI Retail War Room</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/pages.css">
</head>
<body data-page="forecast">

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-col">
    <div id="navbarMount"></div>

    <main class="content">
      <div id="errorBanner" class="error-banner"></div>

      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-body">
          <div class="forecast-stat-row">
            <div class="forecast-stat"><div class="fs-label">Trend</div><div class="fs-value" id="statTrend">—</div></div>
            <div class="forecast-stat"><div class="fs-label">Change</div><div class="fs-value" id="statChange">—</div></div>
            <div class="forecast-stat"><div class="fs-label">Avg. Forecast</div><div class="fs-value" id="statAvg">—</div></div>
            <div class="forecast-stat"><div class="fs-label">Confidence Width</div><div class="fs-value" id="statConfidence">—</div></div>
          </div>
        </div>
      </div>

      <div class="section-title"><h2>Historical Sales &amp; Forecast</h2><span class="hint">90 days actual + 30-day projection with confidence interval</span></div>
      <div class="panel">
        <div class="panel-body"><div style="height:340px;"><canvas id="forecastFullChart"></canvas></div></div>
      </div>

      <div class="section-title"><h2>Forecast Detail</h2><span class="hint">Latest actual: <strong id="statLatestActual">—</strong> · Highest: <strong id="statHighest">—</strong> · Lowest: <strong id="statLowest">—</strong> · Horizon: <strong id="statDays">—</strong></span></div>
      <div class="panel">
        <div class="panel-body tight" style="max-height:480px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>Date</th><th class="num">Forecast</th><th class="num">Lower Bound</th><th class="num">Upper Bound</th></tr></thead>
            <tbody id="forecastTableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="footerMount"></div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/charts.js"></script>
<script src="../js/forecast.js"></script>
</body>
</html>
